services:
  # Django Backend API
  - type: web
    name: ainick-backend
    env: python
    region: oregon
    buildCommand: bash ./build.sh
    startCommand: gunicorn governance_hub.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    plan: standard
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: governance_hub.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "ainick-backend.onrender.com,.onrender.com,localhost,127.0.0.1,gosh-nine.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://gosh-nine.vercel.app,http://localhost:5173,http://127.0.0.1:5173"
      - key: CORS_ALLOW_CREDENTIALS
        value: "True"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://gosh-nine.vercel.app,https://ainick-backend.onrender.com,http://localhost:5173"
      - key: DATABASE_URL
        fromDatabase:
          name: ainick-db
          property: connectionString
      - key: ENVIRONMENT
        value: "production"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "superadmin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "superadmin@ainick.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "Superadmin@098"
      - key: SESSION_COOKIE_SAMESITE
        value: "None"
      - key: CSRF_COOKIE_SAMESITE
        value: "None"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"

# PostgreSQL Database
databases:
  - name: ainick-db
    databaseName: ainick_governance
    user: ainick_user
    plan: standard
    region: oregon
